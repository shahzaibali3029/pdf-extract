<!-- ═══════════════════════════════════════════════════════════ -->
<!-- Upload Component Template                                  -->
<!-- ═══════════════════════════════════════════════════════════ -->

<div class="card-wrapper" style="animation: fade-in-up 0.6s ease-out forwards">
    <div class="glass-card">

        <!-- ── Header ──────────────────────────────────────────── -->
        <div class="card-header">
            <div class="header-icon-wrap">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" stroke="#818cf8"
                    viewBox="0 0 24 24" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m6.75 12l-3-3m0 0l-3 3m3-3v6m-1.5-15H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                </svg>
            </div>
            <h2 class="card-title">Extract Images from PDF</h2>
            <p class="card-subtitle">Upload your PDF and get all embedded images as a ZIP</p>
        </div>

        <!-- ── IDLE / SELECTED: Drop Zone ──────────────────────── -->
        <div *ngIf="state() !== 'uploading'" class="drop-zone" [class.drop-zone--active]="isDragOver()"
            [class.drop-zone--has-file]="state() !== 'idle'" (dragover)="onDragOver($event)"
            (dragleave)="onDragLeave($event)" (drop)="onDrop($event)" (click)="fileInput.click()">
            <input #fileInput type="file" accept=".pdf,application/pdf" class="file-input-hidden"
                (change)="onFileSelected($event)" />

            <!-- No file selected yet -->
            <div *ngIf="state() === 'idle'" class="idle-content">
                <div class="upload-icon-circle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" stroke="#818cf8"
                        viewBox="0 0 24 24" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
                    </svg>
                </div>
                <div class="idle-text">
                    <p class="idle-title">Drag &amp; drop your PDF here</p>
                    <p class="idle-sub">or <span class="browse-link">browse files</span></p>
                </div>
                <div class="divider-row">
                    <div class="divider-line"></div>
                    <span class="divider-label">PDF ONLY</span>
                    <div class="divider-line"></div>
                </div>
            </div>

            <!-- File selected -->
            <div *ngIf="state() === 'selected' || state() === 'done'" class="file-row">
                <div class="file-icon-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#f87171" viewBox="0 0 24 24">
                        <path
                            d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 2l5 5h-5V4zM6 20V4h5v7h7v9H6z" />
                    </svg>
                </div>
                <div class="file-info">
                    <p class="file-name">{{ selectedFile()?.name }}</p>
                    <p class="file-size">{{ fileSize() }}</p>
                </div>
                <button class="remove-btn" (click)="reset(); $event.stopPropagation()" title="Remove file">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- ── UPLOADING: Loading Spinner ──────────────────────── -->
        <div *ngIf="state() === 'uploading'" class="loading-area">
            <div class="spinner-wrapper">
                <div class="spinner-ring"></div>
                <div class="spinner-ring spinner-ring--inner"></div>
                <svg class="spinner-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none"
                    stroke="#a5b4fc" viewBox="0 0 24 24" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
                </svg>
            </div>
            <div class="loading-text">
                <p class="loading-title">Extracting images&hellip;</p>
                <p class="loading-sub">Processing your PDF, this won't take long</p>
            </div>
            <div class="shimmer-bar"></div>
        </div>

        <!-- ── Action Buttons ──────────────────────────────────── -->
        <div class="actions">
            <!-- Extract Button -->
            <button *ngIf="state() === 'selected'" class="btn-primary" (click)="extract()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <span>Extract Images</span>
            </button>

            <!-- Download Button -->
            <button *ngIf="state() === 'done'" class="btn-success" (click)="download()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                <span>Download ZIP</span>
            </button>

            <!-- Extract Another -->
            <button *ngIf="state() === 'done'" class="btn-ghost" (click)="reset()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                <span>Extract Another PDF</span>
            </button>
        </div>
    </div>
</div>
